name: Build Client Windows Portable

on:
  push:
    branches: [ main, master ]
    paths:
      - 'boer-lan-client/**'
      - '.github/workflows/build-client-windows-portable.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: boer-lan-client
        run: npm install

      - name: Build Tauri app
        working-directory: boer-lan-client
        run: npm run tauri:build:portable

      - name: Build portable package
        working-directory: boer-lan-client
        shell: pwsh
        run: ./scripts/package-portable.ps1

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows-portable
          path: boer-lan-client/src-tauri/target/release/portable/Boer-LAN-Manager
          if-no-files-found: error

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            boer-lan-client/src-tauri/target/release/portable/Boer-LAN-Manager-windows-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
